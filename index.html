<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/logo.png">
    <title>Nova Guardian AI | High-Level Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; }
        .zinc-card { background-color: #09090b; border: 1px solid #27272a; border-radius: 12px; }
        .zinc-input { background-color: #09090b; border: 1px solid #27272a; color: #fff; font-size: 1rem; }
        .zinc-input:focus { border-color: #71717a; outline: none; }
        
        .terminal-log { 
            background-color: #000; 
            border: 1px solid #3f3f46;
            color: #10b981; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem; 
            line-height: 1.6;
            padding: 20px;
            border-radius: 8px;
        }
        
        .risk-bar-bg { background: #27272a; height: 12px; border-radius: 6px; width: 100%; overflow: hidden; }
        .risk-bar-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Smooth reveal for preview image */
        #imgPreview {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
            <div class="flex items-center gap-4">
                <img src="/logo.png" class="w-12 h-12 rounded-lg shadow-xl border border-zinc-700" alt="NG AI Logo">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tighter italic">Nova Guardian <span class="text-emerald-500 text-2xl not-italic ml-1">AI</span></h1>
                    <p class="text-[10px] text-zinc-500 font-bold tracking-[0.3em] uppercase">Security Intelligence Command</p>
                </div>
            </div>
            <span class="text-[10px] font-black bg-emerald-500/10 text-emerald-500 px-4 py-1.5 rounded-full border border-emerald-500/20">
                ● SYSTEMS_ACTIVE
            </span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- LEFT: INPUTS -->
            <div class="lg:col-span-5 space-y-8">
                <div class="zinc-card p-8">
                    <h3 class="text-xs font-bold mb-6 text-zinc-500 uppercase tracking-widest flex items-center">
                        <i class="fas fa-database mr-2 text-emerald-500"></i> Source Data Stream
                    </h3>
                    <textarea id="textIn" rows="5" class="zinc-input w-full p-4 rounded-xl mb-6" placeholder="Paste link or message here..."></textarea>
                    <button onclick="scanText()" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 font-black py-4 rounded-xl transition-all uppercase text-xs tracking-widest">
                        Interrogate Source
                    </button>
                </div>

                <div class="zinc-card p-8">
                    <h3 class="text-xs font-bold mb-6 text-zinc-500 uppercase tracking-widest flex items-center">
                        <i class="fas fa-expand mr-2 text-purple-500"></i> Visual Intelligence
                    </h3>
                    
                    <!-- THE PREVIEW BOX -->
                    <div onclick="document.getElementById('fileIn').click()" 
                         class="relative border-2 border-dashed border-zinc-800 rounded-xl min-h-[250px] flex flex-col items-center justify-center cursor-pointer hover:border-zinc-600 transition-all overflow-hidden bg-zinc-950/20 group">
                        
                        <!-- Placeholder Content (Hidden when image shown) -->
                        <div id="uploadUI" class="text-center">
                            <i class="fas fa-cloud-upload-alt text-3xl text-zinc-600 group-hover:text-zinc-400 mb-3"></i>
                            <p class="text-sm font-semibold text-zinc-500">Upload Scam Screenshot</p>
                        </div>

                        <!-- THE IMAGE PREVIEW (Fix) -->
                        <img id="imgPreview" src="" class="hidden absolute inset-0 w-full h-full object-contain p-2 bg-zinc-950">
                        
                        <!-- Scanning Overlay -->
                        <div id="scanOverlay" class="hidden absolute inset-0 bg-emerald-500/10 backdrop-blur-sm flex items-center justify-center">
                            <div class="text-center text-emerald-500">
                                <i class="fas fa-circle-notch fa-spin text-3xl mb-2"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest">Neural Scan Active</p>
                            </div>
                        </div>
                    </div>

                    <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="handleFileSelect(this)">
                </div>
            </div>

            <!-- RIGHT: BIG INTELLIGENCE REPORT -->
            <div class="lg:col-span-7">
                <div id="reportContainer" class="zinc-card p-10 min-h-[650px] flex flex-col relative overflow-hidden shadow-2xl">
                    
                    <div id="waiting" class="flex-1 flex flex-col items-center justify-center text-center py-20">
                        <i class="fas fa-satellite-dish text-6xl text-zinc-800 mb-6 animate-pulse"></i>
                        <p class="text-xs font-bold text-zinc-600 uppercase tracking-[0.4em]">Waiting for data input</p>
                    </div>

                    <div id="results" class="hidden flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-10">
                            <div>
                                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Verdict_Status</p>
                                <h2 id="resLevel" class="text-5xl font-black italic tracking-tighter">SAFE</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Risk_Factor</p>
                                <h2 id="resScore" class="text-6xl font-black tracking-tighter text-white">0%</h2>
                            </div>
                        </div>

                        <div class="risk-bar-bg mb-12 shadow-inner">
                            <div id="resBar" class="risk-bar-fill" style="width: 0%"></div>
                        </div>

                        <div class="space-y-10 flex-1">
                            <div>
                                <p class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-6 flex items-center">
                                    <i class="fas fa-shield-virus mr-2 text-red-500"></i> Signal Anomalies detected
                                </p>
                                <div id="reasons" class="space-y-3 px-2"></div>
                            </div>
                            <div>
                                <p class="text-xs font-black text-emerald-500 uppercase tracking-widest mb-4 italic">
                                    > Extracted_Intel_Log
                                </p>
                                <div id="resRaw" class="terminal-log break-words"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // HANDLE PREVIEW AND AUTOMATIC UPLOAD
        function handleFileSelect(input) {
            const file = input.files[0];
            if(!file) return;

            // 1. Show Preview Instantly
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('uploadUI').classList.add('hidden');
                document.getElementById('scanOverlay').classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            // 2. Start Backend Upload
            uploadFile(file);
        }

        async function uploadFile(file) {
            startAnalysis();
            const fd = new FormData();
            fd.append('file', file);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                document.getElementById('scanOverlay').classList.add('hidden');
                updateUI(data, data.extracted);
            } catch(e) {
                console.error(e);
                alert("Scan failed. Check Tesseract installation.");
            }
        }

        async function scanText() {
            const content = document.getElementById('textIn').value;
            if(!content) return;
            startAnalysis();
            const res = await fetch('/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: content, type: 'message'})
            });
            updateUI(await res.json(), content);
        }

        function startAnalysis() {
            document.getElementById('waiting').innerHTML = '<i class="fas fa-spinner fa-spin text-4xl text-emerald-500 mb-4"></i><p class="text-xs font-mono text-emerald-500">PROCESSING_INTELLIGENCE...</p>';
            document.getElementById('results').classList.add('hidden');
            document.getElementById('waiting').classList.remove('hidden');
        }
         function updateUI(data, raw) {
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            
            const score = data.risk;
            const scoreDisp = document.getElementById('resScore');
            const levelDisp = document.getElementById('resLevel');
            const barFill = document.getElementById('resBar');
            const rawLog = document.getElementById('resRaw');

            scoreDisp.innerText = score + '%';
            barFill.style.width = score + '%';
            rawLog.innerText = raw;

            // Update Colors
            let themeColor = "#10b981"; // Default Green
            if(score > 70) themeColor = "#ef4444"; // Red
            else if(score > 40) themeColor = "#f59e0b"; // Amber

            levelDisp.innerText = data.level;
            levelDisp.style.color = themeColor;
            barFill.style.backgroundColor = themeColor;
            scoreDisp.style.color = score > 40 ? themeColor : "#fff";

            // --- NEW BULLET POINTS UI ---
            const reasonsDiv = document.getElementById('reasons');
            reasonsDiv.innerHTML = `
                <ul class="space-y-4">
                    ${data.reasons.map(r => `
                        <li class="flex items-start gap-3">
                            <span class="mt-1 flex-shrink-0">
                                <i class="fas fa-shield-virus text-[10px]" style="color: ${themeColor}"></i>
                            </span>
                            <span class="text-sm font-medium text-zinc-300 tracking-tight leading-snug">
                                ${r}
                            </span>
                        </li>
                    `).join('')}
                </ul>
            `;
        }
        
    </script>
</body>
</html>
